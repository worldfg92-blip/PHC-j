            var localUser = JSON.parse(localStorage.getItem('phc_current_user'));

            return localUser;
        }

        async function querySupabase(table, query = '') {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                if (!response.ok) return [];
                return await response.json();
            } catch (e) {
                console.error("Supabase Error:", e);
                return [];
            }
        }

        async function saveToSupabase(table, data) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });
                return response.ok;
            } catch (e) {
                console.error("Supabase Save Error:", e);
                return false;
            }
        }

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                return response.ok;
            } catch (e) {

            duration = duration || 3000;
            var toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(function() {
                toast.classList.remove('show');
            }, duration);
        }

            var now = new Date();
            var year = now.getFullYear();
            var month = String(now.getMonth() + 1).padStart(2, '0');
            var day = String(now.getDate()).padStart(2, '0');
            return year + month + day;
        }

                    'Shanghai Shenhua FC': '🇨🇳', 'Zhejiang FC': '🇨🇳',
                    'IFK Goteborg': '🇸🇪', 'AIK': '🇸🇪',
                    'IF Elfsborg': '🇸🇪', 'Hammarby IF': '🇸🇪',
                    'Odds BK': '🇳🇴', 'FK Haugesund': '🇳🇴',
                    'CA Estudiantes': '🇦🇷', 'Racing de Cordoba': '🇦🇷',
                    'Nautico PE': '🇧🇷', 'EC Juventude RS': '🇧🇷'
                };
                
                allMatches.push({
                    id: index + 1,
                    number: data.number,
                    home: data.home,
                    away: data.away,
                    homeFlag: flags[data.home] || '🏳️',
                    awayFlag: flags[data.away] || '🏳️',
                    homeScore: 0,
                    awayScore: 0,
                    status: 'upcoming',
                    minute: 0,
                    odds: data.odds,
                    matchTime: matchDate,
                    locked: false,
                    date: data.date,
                    time: data.time
                });
            });

            localStorage.setItem('phc_round_matches_' + getRoundNumber(), JSON.stringify(allMatches));
            
            renderMatches();
            setupCountdown();
            saveMatchesToSupabase();
            
            showToast('✅ Round loaded! Pick 12 games to play.');
        }

        // ==========================================================
        // SAVE MATCHES TO SUPABASE
        // ==========================================================
        async function saveMatchesToSupabase() {
            var user = getCurrentUser();
            if (!user) return;

            var roundNumber = getRoundNumber();
            
            await deleteFromSupabase('jackpot_entries', `?user_email=eq.${user.email}&round_number=eq.${roundNumber}`);

            for (var i = 0; i < allMatches.length; i++) {
                var match = allMatches[i];
                await saveToSupabase('jackpot_entries', {
                    user_email: user.email,
                    user_name: user.firstName + ' ' + user.lastName,
                    match_id: match.id,
                    match_number: match.number,
                    home_team: match.home,
                    away_team: match.away,
                    home_flag: match.homeFlag,
                    away_flag: match.awayFlag,
                    match_date: match.date + ' ' + match.time,
                    match_time: match.matchTime.toISOString(),
                    home_score: match.homeScore,
                    away_score: match.awayScore,
                    status: match.status,
                    minute: match.minute,
                    odds_home: match.odds.home,
                    odds_draw: match.odds.draw,
                    odds_away: match.odds.away,
                    round_number: roundNumber,
                    entry_status: 'active'
                });
            }
        }

        // ==========================================================
        // RENDER MATCHES
        // ==========================================================
        function renderMatches() {
            var container = document.getElementById('matchContainer');
            var html = '';
            var now = new Date();

            document.getElementById('roundNumber').textContent = getRoundNumber();

            allMatches.forEach(function(match) {
                var matchTime = new Date(match.matchTime);
                var matchEnd = new Date(matchTime);
                matchEnd.setHours(matchEnd.getHours() + 2);

                if (now >= matchTime && now <= matchEnd) {
                    match.status = 'running';
                    match.locked = true;
                    if (match.homeScore === 0 && match.awayScore === 0) {
                        match.homeScore = Math.floor(Math.random() * 3);
                        match.awayScore = Math.floor(Math.random() * 2);
                    }
                } else if (now > matchEnd) {
                    match.status = 'ended';
                    match.locked = true;
                } else {
                    match.status = 'upcoming';
                    if (now >= new Date(matchTime.getTime() - 30 * 60000)) {
                        match.locked = true;
                    } else {
                        match.locked = false;
                    }
                }

                var isLive = match.status === 'running';
                var isEnded = match.status === 'ended';
                var statusClass = isLive ? 'live' : (isEnded ? 'ended' : 'upcoming');
                var statusLabel = isLive ? match.minute + "'" : (isEnded ? 'FT' : 'Upcoming');
                var scoreClass = isLive ? 'live' : (isEnded ? 'ended' : '');
                var timeDisplay = match.date + ' ' + match.time;

                var selectedHome = selectedCombinations[match.id] && selectedCombinations[match.id].selection === 'home';
                var selectedDraw = selectedCombinations[match.id] && selectedCombinations[match.id].selection === 'draw';
                var selectedAway = selectedCombinations[match.id] && selectedCombinations[match.id].selection === 'away';

                html += `
                    <div class="match-item">
                        <div class="match-header">
                            <span class="match-number">${match.number}</span>
                            <span class="match-status ${statusClass}">
                                ${isLive ? '<span class="pulse"></span>' : ''}
                                ${statusLabel}
                            </span>
                        </div>
                        <div class="match-teams">
                            <div class="team">
                                <span class="flag">${match.homeFlag}</span>
                                <span class="team-name">${match.home}</span>
                            </div>
                            <div class="score ${scoreClass}">${match.homeScore} - ${match.awayScore}</div>
                            <div class="team">
                                <span class="team-name">${match.away}</span>
                                <span class="flag">${match.awayFlag}</span>
                            </div>
                        </div>
                        <div class="match-odds">
                            <div class="odd-btn ${match.locked ? 'locked' : ''} ${selectedHome ? 'selected' : ''}" 
                                 onclick="selectOdd(${match.id}, 'home', ${match.odds.home.toFixed(2)})">
                                <span class="label">1</span>
                                ${match.odds.home.toFixed(2)}
                            </div>
                            <div class="odd-btn ${match.locked ? 'locked' : ''} ${selectedDraw ? 'selected' : ''}" 
                                 onclick="selectOdd(${match.id}, 'draw', ${match.odds.draw.toFixed(2)})">
                                <span class="label">X</span>
                                ${match.odds.draw.toFixed(2)}
                            </div>
                            <div class="odd-btn ${match.locked ? 'locked' : ''} ${selectedAway ? 'selected' : ''}" 
                                 onclick="selectOdd(${match.id}, 'away', ${match.odds.away.toFixed(2)})">
                                <span class="label">2</span>
                                ${match.odds.away.toFixed(2)}
                            </div>
                        </div>
                        <div class="match-time">${timeDisplay}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
            updateBetBar();
            updateLiveMatches();
        }

        // ==========================================================
        // UPDATE LIVE MATCHES
        // ==========================================================
        function updateLiveMatches() {
            localStorage.setItem('phc_live_matches', JSON.stringify(allMatches));
            localStorage.setItem('phc_live_matches_updated', Date.now().toString());
            
            allMatches.forEach(function(match) {
                if (match.status === 'running' || match.status === 'ended') {
                    var user = getCurrentUser();
                    if (user) {
                        var query = `?match_id=eq.${match.id}&user_email=eq.${user.email}`;
                        fetch(`${SUPABASE_URL}/rest/v1/jackpot_entries${query}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                home_score: match.homeScore,
                                away_score: match.awayScore,
                                status: match.status,
                                minute: match.minute || 0
                            })
                        });
                    }
                }
            });
        }

        // ==========================================================
        // SELECT ODD
        // ==========================================================
        function selectOdd(matchId, selection, oddValue) {
            var match = allMatches.find(function(m) { return m.id === matchId; });
            if (!match || match.locked) {
                showToast('⚠️ This match is locked or already started!');
                return;
            }

            if (selectedCombinations[matchId] && selectedCombinations[matchId].selection === selection) {
                delete selectedCombinations[matchId];
            } else {
                selectedCombinations[matchId] = { selection: selection, odd: oddValue };
            }

            localStorage.setItem('phc_jackpot_selections', JSON.stringify(selectedCombinations));
            renderMatches();
            updateBetBar();
        }

        // ==========================================================
        // UPDATE BET BAR
        // ==========================================================
        function updateBetBar() {
            var count = Object.keys(selectedCombinations).length;
            document.getElementById('combinationCount').textContent = count + ' / 12';
            
            var btn = document.getElementById('playToWinBtn');
            if (count === 12 && !isBettingLocked) {
                btn.disabled = false;
                btn.textContent = '🎯 Play to Win';
                btn.className = 'btn-play';
            } else if (isBettingLocked) {
                btn.disabled = true;
                btn.className = 'btn-play locked';
                btn.textContent = '⏳ Betting Closed';
            } else {
                btn.disabled = true;
                btn.textContent = count + ' / 12 selected';
                btn.className = 'btn-play';
            }
        }

        // ==========================================================
        // PLAY TO WIN
        // ==========================================================
        async function playToWin() {
            var user = getCurrentUser();
            if (!user) {
                showToast('⚠️ Please login first.');
                setTimeout(function() { window.location.href = 'login.html'; }, 800);
                return;
            }

            var count = Object.keys(selectedCombinations).length;
            if (count < 12) {
                showToast('⚠️ You must predict all 12 games to play.');
                return;
            }

            if (isBettingLocked) {
                showToast('⚠️ Betting is closed for this round.');
                return;
            }

            var selections = [];
            allMatches.forEach(function(match) {
                if (selectedCombinations[match.id]) {
                    selections.push({
                        matchId: match.id,
                        matchNumber: match.number,
                        home: match.home,
                        away: match.away,
                        selection: selectedCombinations[match.id].selection,
                        odd: selectedCombinations[match.id].odd
                    });
                }
            });

            localStorage.setItem('phc_jackpot_selections', JSON.stringify(selections));

            var roundNumber = getRoundNumber();
            
            await deleteFromSupabase('jackpot_entries', `?user_email=eq.${user.email}&round_number=eq.${roundNumber}`);

            await saveToSupabase('jackpot_entries', {
                user_email: user.email,
                user_name: user.firstName + ' ' + user.lastName,
                predictions: JSON.stringify(selections),
                status: 'active',
                round_number: roundNumber,
                created_at: new Date().toISOString(),
                entry_status: 'submitted'
            });

            await saveToSupabase('game_history', {
                user_email: user.email,
                game_name: 'Sporty 12 Jackpot',
                game_type: 'jackpot',
                bet_amount: 0,
                win_amount: 0,
                result: 'pending',
                details: '12 games predicted'
            });

            showToast('✅ Predictions saved! Now pick your card.');
            setTimeout(function() {
                window.location.href = 'games.html';
            }, 800);
        }

        // ==========================================================
        // COUNTDOWN - SIMPLE AND WORKING
        // ==========================================================
        function setupCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);

            // Target: Tomorrow at 10:00 AM (local time)
            var now = new Date();
            var targetDate = new Date(now);
            targetDate.setDate(now.getDate() + 1);
            targetDate.setHours(10, 0, 0, 0);

            // If it's past 10 AM today, add another day
            if (now.getHours() >= 10) {
                targetDate.setDate(now.getDate() + 2);
            }

            // Check if we have a match on July 4th
            var july4 = new Date(2026, 6, 4, 10, 0, 0);
            if (july4.getTime() > now.getTime()) {
                targetDate = july4;
            }

            firstMatchTime = targetDate.getTime();

            console.log('⏰ Countdown target: ' + targetDate.toLocaleString());
            console.log('⏰ Current time: ' + now.toLocaleString());

            countdownInterval = setInterval(function() {
                var nowTime = new Date().getTime();
                var distance = firstMatchTime - nowTime;

                if (distance < 0) {
                    isBettingLocked = true;
                    document.getElementById('playToWinBtn').className = 'btn-play locked';
                    document.getElementById('playToWinBtn').textContent = '⏳ Betting Closed';
                    updateBetBar();
                    
                    document.getElementById('days').textContent = '00';
                    document.getElementById('hours').textContent = '00';
                    document.getElementById('minutes').textContent = '00';
                    document.getElementById('seconds').textContent = '00';
                    return;
                }

                var days = Math.floor(distance / (1000 * 60 * 60 * 24));
                var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                var seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("days").textContent = String(days).padStart(2, '0');
                document.getElementById("hours").textContent = String(hours).padStart(2, '0');
                document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
                document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');
            }, 1000);
        }

        // ==========================================================
        // INIT
        // ==========================================================
        document.addEventListener('DOMContentLoaded', function() {
            var now = new Date();
            var roundNum = now.getFullYear() + 
                          String(now.getMonth() + 1).padStart(2, '0') + 
                          String(now.getDate()).padStart(2, '0');
            document.getElementById('roundNumber').textContent = roundNum;

            var savedSelections = localStorage.getItem('phc_jackpot_selections');
            if (savedSelections) {
                try {
                    var selections = JSON.parse(savedSelections);
                    selections.forEach(function(sel) {
                        selectedCombinations[sel.matchId] = { 
                            selection: sel.selection, 
                            odd: sel.odd 
                        };
                    });
                } catch (e) {}
            }

            generateMatches();

            setInterval(function() {
                updateLiveMatches();
            }, 5000);

            console.log('⚽ PHC Jackpot Predictor loaded!');
            console.log('⏰ Countdown will start working!');
        });

        window.selectOdd = selectOdd;
        window.playToWin = playToWin;
    </script>

</body>
</html>
