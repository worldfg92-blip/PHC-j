<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Spin - PHC Jackpot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ========================================================== */
        /* LUCKY SPIN - WHEEL OF FORTUNE STYLE                        */
        /* ========================================================== */
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0a1a;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #ffffff;
            min-height: 100vh;
        }

        body.dark {
            background: #0a0a1a;
            color: #ffffff;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            background: #0a0a1a;
            min-height: 100vh;
            padding-bottom: 80px;
            position: relative;
            overflow-x: hidden;
        }

        /* ========================================================== */
        /* TOP BAR                                                     */
        /* ========================================================== */
        .topbar {
            background: linear-gradient(135deg, #6c1b8a, #8b1a9e, #6c1b8a);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(108, 27, 138, 0.4);
        }

        .topbar .logo {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar .logo i {
            cursor: pointer;
            font-size: 20px;
        }

        .topbar .balance-display {
            font-size: 14px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .topbar .balance-display i {
            font-size: 14px;
            color: #ffd700;
        }

        /* ========================================================== */
        /* HERO BANNER - GLAMOUROUS                                    */
        /* ========================================================== */
        .hero-banner {
            background: linear-gradient(135deg, #6c1b8a, #8b1a9e, #c71585, #ff1493);
            padding: 30px 20px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid #ffd700;
            background-size: 300% 300%;
            animation: gradientShift 4s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero-banner::before {
            content: '✨';
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 30px;
            opacity: 0.6;
            animation: sparkle 2s ease-in-out infinite;
        }

        .hero-banner::after {
            content: '✨';
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 30px;
            opacity: 0.6;
            animation: sparkle 2s ease-in-out infinite 1s;
        }

        @keyframes sparkle {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.3) rotate(20deg); }
        }

        .hero-banner h1 {
            font-size: 28px;
            font-weight: 900;
            color: #ffffff;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .hero-banner h1 .highlight {
            color: #ffd700;
        }

        .hero-banner .sub {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
            position: relative;
            z-index: 1;
            margin-top: 4px;
        }

        .hero-banner .jackpot-display {
            font-size: 36px;
            font-weight: 900;
            color: #ffd700;
            position: relative;
            z-index: 1;
            margin-top: 8px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .hero-banner .jackpot-display small {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            display: block;
        }

        /* ========================================================== */
        /* STATS ROW - GLAMOUROUS                                      */
        /* ========================================================== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 0 16px;
            margin: -12px 0 16px 0;
            position: relative;
            z-index: 2;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 6px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-box .stat-number {
            font-size: 18px;
            font-weight: 800;
            color: #ffd700;
            display: block;
        }

        .stat-box .stat-number.pink {
            color: #ff1493;
        }

        .stat-box .stat-number.green {
            color: #10b981;
        }

        .stat-box .stat-label {
            font-size: 9px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-top: 2px;
        }

        /* ========================================================== */
        /* WHEEL CONTAINER - MAIN GAME                                */
        /* ========================================================== */
        .wheel-container {
            padding: 0 16px;
            margin-bottom: 16px;
        }

        .wheel-card {
            background: linear-gradient(180deg, rgba(108, 27, 138, 0.3), rgba(10, 10, 26, 0.9));
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        .wheel-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* ========================================================== */
        /* THE WHEEL                                                   */
        /* ========================================================== */
        .wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
            aspect-ratio: 1/1;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            border: 6px solid #ffd700;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.2), inset 0 0 60px rgba(255, 215, 0, 0.05);
        }

        .wheel .segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
            cursor: default;
            overflow: hidden;
        }

        .wheel .segment .segment-label {
            position: absolute;
            font-size: 11px;
            font-weight: 800;
            transform: rotate(0deg);
            text-align: center;
            line-height: 1.2;
            color: #ffffff;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.8);
        }

        .wheel .segment .segment-value {
            font-size: 14px;
            font-weight: 900;
        }

        /* Wheel Pointer */
        .wheel-pointer {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: #ffd700;
            z-index: 10;
            filter: drop-shadow(0 4px 15px rgba(255, 215, 0, 0.5));
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        /* Center decoration */
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffd700, #f59e0b);
            border: 4px solid #ffffff;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: #0a0a1a;
        }

        /* ========================================================== */
        /* BET CONTROLS - FIXED BUTTONS                               */
        /* ========================================================== */
        .bet-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin: 16px 0 12px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .bet-controls .bet-label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            min-width: 40px;
        }

        .bet-controls .bet-amount {
            flex: 1;
            min-width: 80px;
            max-width: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            outline: none;
        }

        .bet-controls .bet-amount:focus {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }

        .bet-controls .bet-amount::-webkit-inner-spin-button,
        .bet-controls .bet-amount::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .bet-controls .bet-amount[type=number] {
            -moz-appearance: textfield;
        }

        .bet-controls .bet-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            transition: 0.2s;
            min-width: 40px;
            user-select: none;
        }

        .bet-controls .bet-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .bet-controls .bet-btn:active {
            transform: scale(0.95);
        }

        /* ========================================================== */
        /* SPIN BUTTON - GLAMOUROUS                                    */
        /* ========================================================== */
        .spin-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            background: linear-gradient(135deg, #ffd700, #f59e0b, #ffd700);
            color: #0a0a1a;
            box-shadow: 0 4px 30px rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .spin-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shine 3s ease-in-out infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .spin-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 40px rgba(255, 215, 0, 0.4);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .spin-btn .btn-sub {
            display: block;
            font-size: 11px;
            font-weight: 600;
            opacity: 0.7;
            text-transform: none;
            letter-spacing: 0;
            margin-top: 2px;
        }

        /* ========================================================== */
        /* RESULT DISPLAY                                              */
        /* ========================================================== */
        .result-display {
            display: none;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 16px;
            padding: 20px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            margin-top: 16px;
            text-align: center;
            animation: resultSlideIn 0.6s ease;
        }

        @keyframes resultSlideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .result-display.show {
            display: block;
        }

        .result-display .result-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

        .result-display .result-emoji {
            font-size: 48px;
            display: block;
            margin: 4px 0;
        }

        .result-display .result-amount {
            font-size: 28px;
            font-weight: 900;
            color: #ffd700;
            margin: 4px 0;
        }

        .result-display .result-amount.win {
            color: #10b981;
        }

        .result-display .result-amount.lose {
            color: #ef4444;
        }

        .result-display .result-message {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
        }

        .result-display .result-message .highlight-text {
            color: #ffd700;
            font-weight: 700;
        }

        /* ========================================================== */
        /* HISTORY SECTION - GLAMOUROUS                                */
        /* ========================================================== */
        .history-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .history-section .history-title {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-section .history-title .clear-btn {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            background: none;
            border: none;
        }

        .history-section .history-title .clear-btn:hover {
            color: #ef4444;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item .h-result {
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
        }

        .history-item .h-result.win {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .history-item .h-result.lose {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .history-item .h-amount {
            font-weight: 700;
            font-size: 14px;
        }

        .history-item .h-amount.win-amount {
            color: #10b981;
        }

        .history-item .h-amount.lose-amount {
            color: #ef4444;
        }

        .history-item .h-segment {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* ========================================================== */
        /* BOTTOM NAV                                                  */
        /* ========================================================== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 14px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 200;
        }

        .nav-item {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 12px;
            transition: 0.2s;
            border: none;
            background: transparent;
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: #ffd700;
        }

        .nav-item:hover:not(.active) {
            color: rgba(255, 255, 255, 0.7);
        }

        /* ========================================================== */
        /* TOAST                                                       */
        /* ========================================================== */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(10px);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .toast.show {
            opacity: 1;
        }

        /* ========================================================== */
        /* RESPONSIVE                                                  */
        /* ========================================================== */
        @media (max-width: 480px) {
            .hero-banner h1 {
                font-size: 22px;
            }
            .hero-banner .jackpot-display {
                font-size: 28px;
            }
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
            }
            .stat-box .stat-number {
                font-size: 16px;
            }
            .wheel-wrapper {
                max-width: 280px;
            }
            .wheel-center {
                width: 45px;
                height: 45px;
                font-size: 14px;
            }
            .wheel-pointer {
                font-size: 30px;
                top: -12px;
            }
            .topbar .balance-display {
                font-size: 12px;
                padding: 4px 10px;
            }
            .bet-controls .bet-btn {
                padding: 6px 10px;
                font-size: 12px;
                min-width: 32px;
            }
            .spin-btn {
                font-size: 17px;
                padding: 15px;
            }
            .result-display .result-amount {
                font-size: 24px;
            }
        }

        @media (max-width: 380px) {
            .wheel-wrapper {
                max-width: 220px;
            }
            .wheel-center {
                width: 36px;
                height: 36px;
                font-size: 11px;
            }
            .wheel .segment .segment-label {
                font-size: 8px;
            }
            .hero-banner h1 {
                font-size: 18px;
            }
            .hero-banner .jackpot-display {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

    <div class="app">

        <!-- TOP BAR -->
        <div class="topbar">
            <div class="logo">
                <i class="fas fa-arrow-left" onclick="history.back()"></i>
                🎡 Lucky Spin
            </div>
            <div class="balance-display">
                <i class="fas fa-wallet"></i>
                <span id="spinBalance">$0.00</span>
            </div>
        </div>

        <!-- HERO BANNER -->
        <div class="hero-banner">
            <h1>🎡 <span class="highlight">Lucky</span> Spin</h1>
            <div class="sub">Spin the wheel and win big! 💎</div>
            <div class="jackpot-display">
                <small>💰 Current Jackpot</small>
                <span id="jackpotDisplay">$15,847</span>
            </div>
        </div>

        <!-- STATS ROW -->
        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-number" id="spinGamesPlayed">0</span>
                <span class="stat-label">Spins</span>
            </div>
            <div class="stat-box">
                <span class="stat-number pink" id="spinGamesWon">0</span>
                <span class="stat-label">Wins</span>
            </div>
            <div class="stat-box">
                <span class="stat-number green" id="spinTotalWon">$0</span>
                <span class="stat-label">Total Won</span>
            </div>
            <div class="stat-box">
                <span class="stat-number" id="spinWinRate">0%</span>
                <span class="stat-label">Win Rate</span>
            </div>
        </div>

        <!-- WHEEL CONTAINER -->
        <div class="wheel-container">

            <div class="wheel-card">

                <!-- The Wheel -->
                <div class="wheel-wrapper">
                    <div class="wheel-pointer">▼</div>
                    <div class="wheel" id="wheel"></div>
                    <div class="wheel-center">🎯</div>
                </div>

                <!-- Bet Controls - ALL BUTTONS WORKING -->
                <div class="bet-controls">
                    <span class="bet-label">Bet</span>
                    <button class="bet-btn" id="betMinus10" onclick="adjustSpinBet(-10)">-10</button>
                    <button class="bet-btn" id="betMinus1" onclick="adjustSpinBet(-1)">-1</button>
                    <input type="number" class="bet-amount" id="spinBetAmount" value="10" min="1" max="1000">
                    <button class="bet-btn" id="betPlus1" onclick="adjustSpinBet(1)">+1</button>
                    <button class="bet-btn" id="betPlus10" onclick="adjustSpinBet(10)">+10</button>
                </div>

                <!-- Spin Button -->
                <button class="spin-btn" id="spinBtn" onclick="spinWheel()">
                    🎡 SPIN NOW!
                    <span class="btn-sub">Win up to 100x your bet!</span>
                </button>

                <!-- Result Display -->
                <div class="result-display" id="spinResult">
                    <div class="result-title" id="spinResultTitle">🎯 Result</div>
                    <span class="result-emoji" id="spinResultEmoji">🎉</span>
                    <div class="result-amount" id="spinResultAmount">---</div>
                    <div class="result-message" id="spinResultMessage"></div>
                </div>

            </div>

            <!-- History Section -->
            <div class="history-section" style="margin-top:16px;">
                <div class="history-title">
                    <span>📋 Recent Spins</span>
                    <button class="clear-btn" onclick="clearSpinHistory()">Clear All</button>
                </div>
                <div id="spinHistoryList">
                    <div style="text-align:center; color:rgba(255,255,255,0.3); font-size:13px; padding:12px 0;">
                        No spins yet. Spin the wheel!
                    </div>
                </div>
            </div>

        </div>

        <!-- BOTTOM NAV -->
        <div class="bottom-nav">
            <div class="nav-item" onclick="location.href='index.html'">
                <i class="fas fa-home"></i> Home
            </div>
            <div class="nav-item" onclick="location.href='quick-pick.html'">
                <i class="fas fa-bolt"></i> Quick Pick
            </div>
            <div class="nav-item active" onclick="location.href='lucky-spin.html'">
                <i class="fas fa-circle"></i> Lucky Spin
            </div>
            <div class="nav-item" onclick="location.href='wallet.html'">
                <i class="fas fa-wallet"></i> Wallet
            </div>
        </div>

    </div>

    <div id="toast" class="toast">Message</div>

    <script>
        // ==========================================================
        // GLOBAL DARK MODE LOADER

            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.classList.add('show');

        // ==========================================================

        // ==========================================================
        async function querySupabase(table, query = '') {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                if (!response.ok) return [];
                return await response.json();
            } catch (e) {
                console.error("Supabase Error:", e);
                return [];
            }
        }

        async function saveToSupabase(table, data) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });
                return response.ok;
            } catch (e) {
                console.error("Save Error:", e);
                return false;
            }
        }

        async function patchSupabase(table, query, data) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                return response.ok;
            } catch (e) {
                console.error("Patch Error:", e);

        // ==========================================================
        // BUILD WHEEL
        // ==========================================================
        function buildWheel() {
            const wheel = document.getElementById('wheel');
            const segmentCount = wheelSegments.length;
            const anglePerSegment = 360 / segmentCount;

            wheel.innerHTML = '';

            wheelSegments.forEach((segment, index) => {
                const angle = index * anglePerSegment;
                const rotation = angle + (anglePerSegment / 2);

                const div = document.createElement('div');
                div.className = 'segment';
                div.style.cssText = `
                    transform: rotate(${angle}deg) skewY(-${90 - anglePerSegment}deg);
                    background: ${segment.color};
                    transform-origin: 100% 100%;
                    clip-path: polygon(0% 0%, 100% 0%, 0% 100%);
                `;

                const label = document.createElement('div');
                label.className = 'segment-label';
                label.style.cssText = `
                    transform: rotate(${90 - anglePerSegment}deg) skewY(${90 - anglePerSegment}deg) translateX(-50%);
                    position: absolute;
                    top: 10%;
                    left: 55%;
                    font-size: ${window.innerWidth < 380 ? '8px' : '11px'};
                `;
                label.innerHTML = `
                    <div>${segment.label}</div>
                    <div class="segment-value">${segment.value}</div>
                `;

                div.appendChild(label);
                wheel.appendChild(div);
            });
        }

        // ==========================================================
        // ✅ ADJUST BET - FIXED AND WORKING
        // ==========================================================
        function adjustSpinBet(amount) {
            const input = document.getElementById('spinBetAmount');
            let val = parseFloat(input.value) || 10;
            
            // Calculate new value with bounds
            let newVal = val + amount;
            
            // Enforce min/max
            if (newVal < 1) newVal = 1;
            if (newVal > 1000) newVal = 1000;
            
            // Update input
            input.value = newVal;
            
            // Update spin button text to show potential win
            updateSpinButtonText(newVal);
            
            // Visual feedback
            input.style.borderColor = '#ffd700';
            setTimeout(() => {
                input.style.borderColor = 'rgba(255, 255, 255, 0.1)';
            }, 300);
        }

        // ==========================================================
        // UPDATE SPIN BUTTON TEXT
        // ==========================================================
        function updateSpinButtonText(betAmount) {
            const btn = document.getElementById('spinBtn');
            const maxMultiplier = Math.max(...wheelSegments.map(s => s.multiplier));
            const potentialWin = betAmount * maxMultiplier;
            
            btn.innerHTML = `
                🎡 SPIN NOW!
                <span class="btn-sub">Win up to $${formatCurrency(potentialWin)} (${maxMultiplier}x)</span>
            `;
        }

        // ==========================================================
        // SPIN WHEEL - FULLY INTEGRATED WITH SUPABASE
        // ==========================================================
        async function spinWheel() {
            if (isSpinning) return;

            const user = getCurrentUser();
            if (!user) {
                showToast('⚠️ Please login first.');
                setTimeout(() => window.location.href = 'login.html', 800);
                return;
            }

            const bet = parseFloat(document.getElementById('spinBetAmount').value) || 10;
            if (bet < 1 || bet > 1000) {
                showToast('⚠️ Bet must be between $1 and $1,000.');
                return;
            }

            // Check balance from Supabase
            const users = await querySupabase('users', `?email=eq.${user.email}`);
            if (!users || users.length === 0) {
                showToast('⚠️ Error fetching user data.');
                return;
            }
            const userData = users[0];

            if (userData.balance < bet) {
                showToast(`⚠️ Insufficient balance! You have $${formatCurrency(userData.balance)}`);
                return;
            }

            // Disable spin
            isSpinning = true;
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            btn.textContent = '🎡 SPINNING...';

            // Hide previous result
            document.getElementById('spinResult').classList.remove('show');

            // Random spin
            const spinCount = 5 + Math.random() * 3;
            const randomStop = Math.floor(Math.random() * wheelSegments.length);
            const anglePerSegment = 360 / wheelSegments.length;
            const targetAngle = (spinCount * 360) + (randomStop * anglePerSegment) + (anglePerSegment / 2);

            currentRotation += targetAngle;
            const wheel = document.getElementById('wheel');
            wheel.style.transition = 'transform 4.5s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Wait for spin to finish
            await new Promise(resolve => setTimeout(resolve, 4800));

            // Determine result
            const segment = wheelSegments[randomStop];
            const winAmount = bet * segment.multiplier;
            const isWin = segment.multiplier > 1;

            // Update balance in Supabase
            let newBalance = userData.balance - bet + winAmount;
            await updateUserBalance(user.email, newBalance);
            await saveTransaction(user.email, `🎡 Lucky Spin ${isWin ? 'Win' : 'Loss'}`, isWin ? winAmount : -bet);

            // Update stats
            spinStats.played++;
            if (isWin) {
                spinStats.won++;
                spinStats.totalWon += winAmount;
            }
            localStorage.setItem('spinStats', JSON.stringify(spinStats));

            // Add to history
            spinHistory.unshift({
                segment: segment.label + ' ' + segment.value,
                bet: bet,
                winAmount: winAmount,
                multiplier: segment.multiplier,
                isWin: isWin,
                time: new Date().toLocaleTimeString()
            });
            if (spinHistory.length > 50) spinHistory.pop();
            localStorage.setItem('spinHistory', JSON.stringify(spinHistory));

            // Show result
            showSpinResult(segment, bet, winAmount, isWin);

            // Update UI
            updateSpinStats();
            renderSpinHistory();
            document.getElementById('spinBalance').textContent = '$' + formatCurrency(newBalance);

            // Re-enable button
            isSpinning = false;
            btn.disabled = false;
            updateSpinButtonText(bet);

            // Toast
            if (isWin) {
                showToast(`🎉 YOU WON! ${segment.multiplier}x! +$${formatCurrency(winAmount)}`);
            } else {
                showToast(`😢 You landed on ${segment.label} ${segment.value}. Try again!`);
            }
        }

            const emoji = document.getElementById('spinResultEmoji');
            const amount = document.getElementById('spinResultAmount');
            const message = document.getElementById('spinResultMessage');

                emoji.textContent = '🎊';
                amount.className = 'result-amount win';
                amount.textContent = `+$${formatCurrency(winAmount)}`;
                message.innerHTML = `

                    (${segment.multiplier}x) and won <span class="highlight-text">$${formatCurrency(winAmount)}</span>!
                `;
            } else {
                title.textContent = '😢 Not This Time';
                emoji.textContent = '💔';
                amount.className = 'result-amount lose';
                amount.textContent = `-$${formatCurrency(bet)}`;
                message.innerHTML = `
                    You landed on <span class="highlight-text">${segment.label} ${segment.value}</span> 
                    (${segment.multiplier}x). Try again for bigger wins!
                `;
            }

            display.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

            document.getElementById('spinTotalWon').textContent = '$' + formatCurrency(spinStats.totalWon);

            document.getElementById('spinWinRate').textContent = winRate + '%';

        // ==========================================================
        // RENDER HISTORY
        // ==========================================================
        function renderSpinHistory() {
            const container = document.getElementById('spinHistoryList');
            
            if (spinHistory.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; color:rgba(255,255,255,0.3); font-size:13px; padding:12px 0;">
                        No spins yet. Spin the wheel!
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            spinHistory.slice(0, 20).forEach(game => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div>
                        <span class="h-segment">${game.segment}</span>
                        <span style="font-size:10px; color:rgba(255,255,255,0.3); margin-left:6px;">${game.time}</span>
                    </div>
                    <div>
                        <span class="h-result ${game.isWin ? 'win' : 'lose'}">
                            ${game.isWin ? 'WIN' : 'LOSE'}
                        </span>
                        <span class="h-amount ${game.isWin ? 'win-amount' : 'lose-amount'}">
                            ${game.isWin ? '+' : '-'}$${formatCurrency(game.isWin ? game.winAmount : game.bet)}
                        </span>
                    </div>
                `;
                container.appendChild(div);
            });
        }
