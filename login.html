<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PHC Jackpot – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #eef2f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    body.dark {
      background: #0f172a;
    }

    .auth-container {
      max-width: 480px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      padding: 48px 40px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.03);
    }

    body.dark .auth-container {
      background: #1e293b;
      border-color: #334155;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .auth-logo .logo-icon {
      background: linear-gradient(135deg, #1a237e, #283593);
      width: 80px;
      height: 80px;
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #f5b342;
      font-size: 34px;
      font-weight: 900;
      box-shadow: 0 8px 30px rgba(26, 35, 126, 0.2);
      margin-bottom: 14px;
    }

    body.dark .auth-logo .logo-icon {
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .auth-logo h1 {
      font-size: 28px;
      font-weight: 800;
      color: #0a1a2a;
      letter-spacing: -0.5px;
    }

    body.dark .auth-logo h1 {
      color: #f8fafc;
    }

    .auth-logo h1 small {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #6c7a8a;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    body.dark .auth-logo h1 small {
      color: #94a3b8;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .auth-form .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .auth-form label {
      font-size: 14px;
      font-weight: 600;
      color: #1a3a5a;
    }

    body.dark .auth-form label {
      color: #e2e8f0;
    }

    .auth-form .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: #f5f8fc;
      border-radius: 16px;
      border: 2px solid #e6edf6;
      transition: 0.2s;
    }

    body.dark .auth-form .input-wrapper {
      background: #2a3a5a;
      border-color: #334155;
    }

    .auth-form .input-wrapper:focus-within {
      border-color: #1a237e;
      box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.08);
    }

    body.dark .auth-form .input-wrapper:focus-within {
      border-color: #f5b342;
      box-shadow: 0 0 0 4px rgba(245, 179, 66, 0.08);
    }

    .auth-form .input-wrapper i {
      position: absolute;
      left: 18px;
      color: #7a8a9a;
      font-size: 18px;
    }

    body.dark .auth-form .input-wrapper i {
      color: #94a3b8;
    }

    .auth-form .input-wrapper input {
      width: 100%;
      padding: 18px 18px 18px 52px;
      border: none;
      background: transparent;
      font-size: 16px;
      outline: none;
      color: #0a1a2a;
    }

    body.dark .auth-form .input-wrapper input {
      color: #f8fafc;
    }

    .auth-form .input-wrapper input::placeholder {
      color: #aabbcc;
    }

    body.dark .auth-form .input-wrapper input::placeholder {
      color: #6c7a8a;
    }

    .auth-form .input-wrapper .toggle-pass {
      position: absolute;
      right: 18px;
      color: #7a8a9a;
      cursor: pointer;
      font-size: 18px;
      z-index: 2;
    }

    body.dark .auth-form .input-wrapper .toggle-pass {
      color: #94a3b8;
    }

    .auth-form .input-wrapper .toggle-pass:hover {
      color: #1a237e;
    }

    body.dark .auth-form .input-wrapper .toggle-pass:hover {
      color: #f5b342;
    }

    .auth-btn {
      background: linear-gradient(135deg, #1a237e, #283593);
      color: #ffffff;
      border: none;
      border-radius: 30px;
      padding: 20px;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 30px rgba(26, 35, 126, 0.2);
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    body.dark .auth-btn {
      background: linear-gradient(135deg, #f5b342, #f59e0b);
      color: #0f172a;
      box-shadow: 0 6px 30px rgba(245, 179, 66, 0.2);
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(26, 35, 126, 0.3);
    }

    body.dark .auth-btn:hover {
      box-shadow: 0 8px 40px rgba(245, 179, 66, 0.3);
    }

    .auth-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 22px 0 16px;
      color: #7a8a9a;
      font-size: 14px;
    }

    body.dark .auth-divider {
      color: #94a3b8;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e6edf6;
    }

    body.dark .auth-divider::before,
    body.dark .auth-divider::after {
      background: #334155;
    }

    .auth-switch {
      text-align: center;
      font-size: 15px;
      color: #5a7a9a;
    }

    body.dark .auth-switch {
      color: #94a3b8;
    }

    .auth-switch a {
      color: #1a237e;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    body.dark .auth-switch a {
      color: #f5b342;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    .auth-error {
      color: #b33a4a;
      font-size: 14px;
      font-weight: 600;
      display: none;
      text-align: center;
      padding: 12px 16px;
      background: #fde8e8;
      border-radius: 12px;
    }

    body.dark .auth-error {
      background: #3a1a1a;
      color: #f87171;
    }

    .auth-success {
      color: #1a8a4a;
      font-size: 14px;
      font-weight: 600;
      display: none;
      text-align: center;
      padding: 12px 16px;
      background: #e6f5ed;
      border-radius: 12px;
    }

    body.dark .auth-success {
      background: #1a3a2a;
      color: #10b981;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a1a2a;
      color: #ffffff;
      padding: 16px 32px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 15px;
      z-index: 9999;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      display: none;
      max-width: 90%;
      text-align: center;
    }

    body.dark .toast {
      background: #1e293b;
    }

    .toast.show {
      display: block;
      animation: toastIn 0.3s ease;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 12px;
    }

    body.dark .spinner {
      border: 3px solid rgba(15, 23, 42, 0.3);
      border-top-color: #0f172a;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 32px 24px 28px;
        border-radius: 28px;
      }

      .auth-logo .logo-icon {
        width: 64px;
        height: 64px;
        font-size: 28px;
        border-radius: 20px;
      }

      .auth-logo h1 {
        font-size: 24px;
      }

      .auth-form .input-wrapper input {
        padding: 16px 16px 16px 48px;
        font-size: 15px;
      }

      .auth-btn {
        padding: 17px;
        font-size: 17px;
      }
    }

    @media (max-width: 380px) {
      .auth-container {
        padding: 24px 16px 20px;
        border-radius: 24px;
      }

      .auth-logo .logo-icon {
        width: 56px;
        height: 56px;
        font-size: 24px;
      }

      .auth-logo h1 {
        font-size: 20px;
      }

      .auth-form .input-wrapper input {
        padding: 14px 14px 14px 44px;
        font-size: 14px;
      }

      .auth-btn {
        padding: 15px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-logo">
      <div class="logo-icon">PHC</div>
      <h1>PHC Jackpot <small>✦ PREMIUM GAMING</small></h1>
    </div>

    <div id="loginForm" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="loginIdentifier" placeholder="Enter your email" />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Enter your password" />
          <span class="toggle-pass" onclick="togglePassword('loginPassword', this)">
            <i class="fas fa-eye"></i>
          </span>
        </div>
      </div>

      <div class="auth-error" id="loginError" style="display:none;">Invalid email or password.</div>
      <div class="auth-success" id="loginSuccess" style="display:none;">Login successful! Redirecting...</div>

      <button class="auth-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </div>

    <div class="auth-divider">or</div>

    <div class="auth-switch">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </div>

  <div class="toast" id="toast">Message</div>

  <script>
    // ============================================================
    // ✅ SUPABASE CONFIGURATION
    // ============================================================
    const SUPABASE_URL = "https://gcesrhfyupmkrevaqpfr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjZXNyaGZ5dXBta3JldmFxcGZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjQ0MjAsImV4cCI6MjA5ODQwMDQyMH0.LarBYjP0Eg4HfFV_x5GVS7K1d4AuRfBWOjo0D1kL2xM";

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function togglePassword(id, el) {
      const i = document.getElementById(id);
      if (i.type === 'password') {
        i.type = 'text';
        el.innerHTML = '<i class="fas fa-eye-slash"></i>';
      } else {
        i.type = 'password';
        el.innerHTML = '<i class="fas fa-eye"></i>';
      }
    }

    (function() {
      if (localStorage.getItem("phc_dark_mode") === "true") {
        document.body.classList.add("dark");
      }
    })();

    document.getElementById('loginBtn').addEventListener('click', async function() {
      const email = document.getElementById('loginIdentifier').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value.trim();

      if (!email || !password) {
        showToast('⚠️ Enter email and password.');
        return;
      }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Logging in...';

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/users?email=eq.${email}`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });

        if (response.status === 404) {
          showToast('⚠️ Database setup required. Please run SQL in Supabase.');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
          return;
        }

        if (!response.ok) {
          throw new Error('Failed to fetch user data.');
        }

        const users = await response.json();

        if (!users || users.length === 0) {
          showToast('❌ No account found with this email.');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
          return;
        }

        const userData = users[0];

        if (userData.password !== password) {
          showToast('❌ Invalid password. Please try again.');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
          return;
        }

        localStorage.setItem('phc_current_user', JSON.stringify({
          email: userData.email,
          firstName: userData.first_name,
          lastName: userData.last_name,
          phone: userData.phone,
          balance: userData.balance || 0,
          address: userData.address,
          country: userData.country || 'US',
          kyc_level: userData.kyc_level || 0,
          kyc_status: userData.kyc_status || 'unverified',
          level: userData.level || 1,
          withdrawal_limit: userData.withdrawal_limit || 1.00,
          entries: userData.entries || 0,
          games: userData.games || 0,
          wins: userData.wins || 0,
          loan_status: userData.loan_status || 'No active loan',
          loan_balance: userData.loan_balance || 0
        }));

        document.getElementById('loginSuccess').style.display = 'block';
        showToast('✅ Login successful!');

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);

      } catch (error) {
        console.error('Login Error:', error);
        showToast('❌ ' + error.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      }
    });
  </script>

</body>
</html>
