<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackjack - PHC Casino</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ========================================================== */
        /* BLACKJACK - LAS VEGAS STYLE                                */
        /* ========================================================== */
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0a0a;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #ffffff;
            min-height: 100vh;
        }

        body.dark {
            background: #0a0a0a;
            color: #ffffff;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            background: #0a0a0a;
            min-height: 100vh;
            padding-bottom: 80px;
            position: relative;
            background-image: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
        }

        /* ========================================================== */
        /* TOP BAR - LAS VEGAS STYLE                                  */
        /* ========================================================== */
        .topbar {
            background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
            color: #ffd700;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #ffd700;
            box-shadow: 0 2px 20px rgba(255, 215, 0, 0.1);
        }

        .topbar .logo {
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ffd700;
        }

        .topbar .logo i {
            cursor: pointer;
            font-size: 20px;
            color: #ffffff;
        }

        .topbar .balance-display {
            font-size: 14px;
            font-weight: 700;
            background: rgba(255, 215, 0, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .topbar .balance-display i {
            font-size: 14px;
            color: #ffd700;
        }

        /* ========================================================== */
        /* HERO BANNER - CASINO STYLE                                 */
        /* ========================================================== */
        .hero-banner {
            background: linear-gradient(135deg, #0d0d0d, #1a0a0a, #0d0d0d);
            padding: 24px 20px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            position: relative;
        }

        .hero-banner::after {
            content: '♠️ ♥️ ♣️ ♦️';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            letter-spacing: 8px;
            opacity: 0.2;
            width: 100%;
            text-align: center;
        }

        .hero-banner h1 {
            font-size: 28px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }

        .hero-banner .sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        /* ========================================================== */
        /* STATS ROW                                                   */
        /* ========================================================== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 0 16px;
            margin: 12px 0 16px 0;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-box .stat-number {
            font-size: 18px;
            font-weight: 800;
            color: #ffd700;
            display: block;
        }

        .stat-box .stat-number.green {
            color: #10b981;
        }

        .stat-box .stat-number.red {
            color: #ef4444;
        }

        .stat-box .stat-label {
            font-size: 9px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-top: 2px;
        }

        /* ========================================================== */
        /* TABLE AREA - GREEN FELT                                    */
        /* ========================================================== */
        .table-area {
            padding: 0 16px;
            margin-bottom: 16px;
        }

        .table-card {
            background: radial-gradient(ellipse at center, #1a6b3c, #0d4a2a, #0a2a1a);
            border-radius: 24px;
            padding: 20px;
            border: 2px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), inset 0 0 60px rgba(0, 0, 0, 0.3);
            position: relative;
            min-height: 300px;
        }

        .table-card .table-label {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a0a0a;
            padding: 4px 20px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ========================================================== */
        /* CARDS DISPLAY                                               */
        /* ========================================================== */
        .cards-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 8px 0 16px 0;
        }

        .hand-section {
            position: relative;
        }

        .hand-section .hand-label {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hand-section .hand-label .hand-total {
            font-size: 18px;
            font-weight: 900;
            color: #ffd700;
        }

        .hand-section .hand-label .hand-total.bust {
            color: #ef4444;
        }

        .hand-section .hand-label .hand-total.blackjack {
            color: #10b981;
            animation: blackjackPulse 1s ease-in-out infinite;
        }

        @keyframes blackjackPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .cards-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            min-height: 70px;
            align-items: center;
        }

        .card {
            background: #ffffff;
            border-radius: 8px;
            padding: 10px 14px;
            min-width: 50px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            animation: dealCard 0.3s ease;
        }

        @keyframes dealCard {
            from { opacity: 0; transform: translateY(-20px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card .card-rank {
            font-size: 18px;
            font-weight: 900;
        }

        .card .card-suit {
            font-size: 20px;
            margin-left: 4px;
        }

        .card.red {
            color: #dc2626;
        }

        .card.black {
            color: #1a1a1a;
        }

        .card.face-down {
            background: linear-gradient(135deg, #1a237e, #0d1b4a);
            color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.2);
        }

        .card.face-down .card-rank,
        .card.face-down .card-suit {
            display: none;
        }

        .card.face-down::after {
            content: '?';
            font-size: 28px;
            font-weight: 900;
            color: rgba(255, 215, 0, 0.3);
        }

        /* ========================================================== */
        /* GAME CONTROLS                                               */
        /* ========================================================== */
        .game-controls {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .game-controls .btn-action {
            flex: 1;
            min-width: 60px;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .game-controls .btn-action:hover:not(:disabled) {
            transform: scale(1.03);
        }

        .game-controls .btn-action:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .btn-hit {
            background: #10b981;
            color: #ffffff;
        }

        .btn-hit:hover:not(:disabled) {
            background: #059669;
        }

        .btn-stand {
            background: #f59e0b;
            color: #0a0a0a;
        }

        .btn-stand:hover:not(:disabled) {
            background: #d97706;
        }

        .btn-double {
            background: #8b5cf6;
            color: #ffffff;
        }

        .btn-double:hover:not(:disabled) {
            background: #7c3aed;
        }

        .btn-split {
            background: #ec4899;
            color: #ffffff;
        }

        .btn-split:hover:not(:disabled) {
            background: #db2777;
        }

        .btn-new-game {
            background: #ffd700;
            color: #0a0a0a;
            font-weight: 900;
        }

        .btn-new-game:hover:not(:disabled) {
            background: #f59e0b;
        }

        /* ========================================================== */
        /* BET CONTROLS - FIXED BUTTONS                               */
        /* ========================================================== */
        .bet-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin: 12px 0 8px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .bet-controls .bet-label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            min-width: 40px;
        }

        .bet-controls .bet-amount {
            flex: 1;
            min-width: 80px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 16px;
            font-weight: 700;
            color: #ffd700;
            text-align: center;
            outline: none;
        }

        .bet-controls .bet-amount:focus {
            border-color: #ffd700;
        }

        .bet-controls .bet-amount::-webkit-inner-spin-button,
        .bet-controls .bet-amount::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .bet-controls .bet-amount[type=number] {
            -moz-appearance: textfield;
        }

        .bet-controls .bet-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            transition: 0.2s;
            min-width: 36px;
            user-select: none;
        }

        .bet-controls .bet-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .bet-controls .bet-btn:active {
            transform: scale(0.95);
        }

        /* ========================================================== */
        /* RESULT DISPLAY                                              */
        /* ========================================================== */
        .result-display {
            display: none;
            text-align: center;
            padding: 12px;
            margin-top: 12px;
            border-radius: 12px;
            animation: resultSlideIn 0.5s ease;
        }

        @keyframes resultSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-display.show {
            display: block;
        }

        .result-display.win {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .result-display.lose {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .result-display.push {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .result-display .result-text {
            font-size: 20px;
            font-weight: 900;
        }

        .result-display .result-text.win-text {
            color: #10b981;
        }

        .result-display .result-text.lose-text {
            color: #ef4444;
        }

        .result-display .result-text.push-text {
            color: #ffd700;
        }

        .result-display .result-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        /* ========================================================== */
        /* HISTORY SECTION                                             */
        /* ========================================================== */
        .history-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 0 16px;
        }

        .history-section .history-title {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-section .history-title .clear-btn {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            background: none;
            border: none;
        }

        .history-section .history-title .clear-btn:hover {
            color: #ef4444;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 12px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item .h-result {
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
        }

        .history-item .h-result.win {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .history-item .h-result.lose {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .history-item .h-result.push {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
        }

        .history-item .h-amount {
            font-weight: 700;
            font-size: 13px;
        }

        .history-item .h-amount.win-amount {
            color: #10b981;
        }

        .history-item .h-amount.lose-amount {
            color: #ef4444;
        }

        /* ========================================================== */
        /* BOTTOM NAV                                                  */
        /* ========================================================== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: rgba(10, 10, 10, 0.98);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 14px 0;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
            z-index: 200;
        }

        .nav-item {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 12px;
            transition: 0.2s;
            border: none;
            background: transparent;
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: #ffd700;
        }

        .nav-item:hover:not(.active) {
            color: rgba(255, 255, 255, 0.6);
        }

        /* ========================================================== */
        /* TOAST                                                       */
        /* ========================================================== */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.95);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toast.show {
            opacity: 1;
        }

        /* ========================================================== */
        /* RESPONSIVE                                                  */
        /* ========================================================== */
        @media (max-width: 480px) {
            .hero-banner h1 {
                font-size: 22px;
            }
            .card {
                min-width: 40px;
                height: 56px;
                padding: 6px 10px;
                font-size: 16px;
            }
            .card .card-rank {
                font-size: 14px;
            }
            .card .card-suit {
                font-size: 16px;
            }
            .hand-section .hand-label .hand-total {
                font-size: 15px;
            }
            .game-controls .btn-action {
                font-size: 12px;
                padding: 10px 12px;
                min-width: 50px;
            }
            .stats-row {
                grid-template-columns: repeat(3, 1fr);
            }
            .table-card {
                padding: 16px;
            }
            .topbar .balance-display {
                font-size: 12px;
                padding: 4px 10px;
            }
            .bet-controls .bet-btn {
                padding: 6px 10px;
                font-size: 12px;
                min-width: 30px;
            }
        }

        @media (max-width: 380px) {
            .card {
                min-width: 32px;
                height: 44px;
                padding: 4px 6px;
                font-size: 12px;
            }
            .card .card-rank {
                font-size: 11px;
            }
            .card .card-suit {
                font-size: 12px;
            }
            .game-controls {
                gap: 6px;
            }
            .game-controls .btn-action {
                font-size: 10px;
                padding: 8px 8px;
                min-width: 40px;
            }
        }
    </style>
</head>

<body>

    <div class="app">

        <!-- TOP BAR -->
        <div class="topbar">
            <div class="logo">
                <i class="fas fa-arrow-left" onclick="history.back()"></i>
                ♠️ Blackjack
            </div>
            <div class="balance-display">
                <i class="fas fa-wallet"></i>
                <span id="bjBalance">$0.00</span>
            </div>
        </div>

        <!-- HERO BANNER -->
        <div class="hero-banner">
            <h1>♠️ Blackjack ♥️</h1>
            <div class="sub">21 - The Classic Casino Game</div>
        </div>

        <!-- STATS ROW -->
        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-number" id="bjGamesPlayed">0</span>
                <span class="stat-label">Games</span>
            </div>
            <div class="stat-box">
                <span class="stat-number green" id="bjGamesWon">0</span>
                <span class="stat-label">Wins</span>
            </div>
            <div class="stat-box">
                <span class="stat-number" id="bjTotalWon">$0</span>
                <span class="stat-label">Total Won</span>
            </div>
        </div>

        <!-- TABLE AREA -->
        <div class="table-area">
            <div class="table-card">
                <span class="table-label">♠️ VEGAS ♥️</span>

                <!-- DEALER HAND -->
                <div class="hand-section">
                    <div class="hand-label">
                        <span>🏛️ Dealer</span>
                        <span class="hand-total" id="dealerTotal">--</span>
                    </div>
                    <div class="cards-row" id="dealerCards"></div>
                </div>

                <!-- PLAYER HAND -->
                <div class="hand-section">
                    <div class="hand-label">
                        <span>👤 You</span>
                        <span class="hand-total" id="playerTotal">--</span>
                    </div>
                    <div class="cards-row" id="playerCards"></div>
                </div>

                <!-- RESULT -->
                <div class="result-display" id="bjResult">
                    <div class="result-text" id="bjResultText">---</div>
                    <div class="result-sub" id="bjResultSub"></div>
                </div>

                <!-- GAME CONTROLS -->
                <div class="game-controls" id="gameControls">
                    <button class="btn-action btn-hit" id="btnHit" onclick="playerHit()" disabled>Hit</button>
                    <button class="btn-action btn-stand" id="btnStand" onclick="playerStand()" disabled>Stand</button>
                    <button class="btn-action btn-double" id="btnDouble" onclick="playerDouble()" disabled>Double</button>
                    <button class="btn-action btn-new-game" id="btnNewGame" onclick="startNewGame()">New Game</button>
                </div>

                <!-- BET CONTROLS - ALL BUTTONS WORKING -->
                <div class="bet-controls" id="betControls">
                    <span class="bet-label">Bet</span>
                    <button class="bet-btn" onclick="adjustBjBet(-10)">-10</button>
                    <button class="bet-btn" onclick="adjustBjBet(-1)">-1</button>
                    <input type="number" class="bet-amount" id="bjBetAmount" value="10" min="1" max="1000">
                    <button class="bet-btn" onclick="adjustBjBet(1)">+1</button>
                    <button class="bet-btn" onclick="adjustBjBet(10)">+10</button>
                </div>

            </div>
        </div>

        <!-- HISTORY -->
        <div class="history-section">
            <div class="history-title">
                <span>📋 Recent Games</span>
                <button class="clear-btn" onclick="clearBjHistory()">Clear All</button>
            </div>
            <div id="bjHistoryList">
                <div style="text-align:center; color:rgba(255,255,255,0.2); font-size:13px; padding:12px 0;">
                    No games played yet. Start playing!
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <div class="bottom-nav">
            <div class="nav-item" onclick="location.href='index.html'">
                <i class="fas fa-home"></i> Home
            </div>
            <div class="nav-item" onclick="location.href='lucky-spin.html'">
                <i class="fas fa-circle"></i> Spin
            </div>
            <div class="nav-item active" onclick="location.href='blackjack.html'">
                <i class="fas fa-club"></i> Blackjack
            </div>
            <div class="nav-item" onclick="location.href='wallet.html'">
                <i class="fas fa-wallet"></i> Wallet
            </div>
        </div>

    </div>

    <div id="toast" class="toast">Message</div>

    <script>
        // ==========================================================
        // GLOBAL DARK MODE LOADER
        // ==========================================================
        (function() {
            if (localStorage.getItem("phc_dark_mode") === "true") {
                document.body.classList.add("dark");
            }
        })();

        // 🔒 GUARD: If not logged in, kick to login
        if (!localStorage.getItem('phc_current_user')) {
            window.location.href = 'login.html';
        }

        // ==========================================================

        // ==========================================================
        // ✅ SAVE GAME TO HISTORY - SO IT APPEARS IN history.html
        // ==========================================================
        async function saveGameHistory(userEmail, gameName, betAmount, winAmount, result, details) {
            try {
                await saveToSupabase('game_history', {
                    user_email: userEmail,

        // ==========================================================
        // DECK FUNCTIONS
        // ==========================================================
        function createDeck() {
            const newDeck = [];
            for (const suit of suits) {
                for (const rank of ranks) {
                    newDeck.push({ rank, suit, value: rankValues[rank] });
                }
            }
            return shuffleDeck(newDeck);
        }

        function shuffleDeck(deck) {
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        function drawCard() {
            if (deck.length === 0) {
                deck = createDeck();
            }
            return deck.pop();
        }

        // ==========================================================
        // HAND FUNCTIONS
        // ==========================================================
        function calculateHandValue(hand) {
            let value = 0;
            let aces = 0;
            for (const card of hand) {
                if (card.rank === 'A') {
                    aces++;
                }
                value += card.value;
            }
            while (value > 21 && aces > 0) {
                value -= 10;
                aces--;
            }
            return value;
        }

        function isBlackjack(hand) {
            return hand.length === 2 && calculateHandValue(hand) === 21;
        }

        function isBust(hand) {
            return calculateHandValue(hand) > 21;
        }

        function cardDisplay(card) {
            const isRed = card.suit === '♥' || card.suit === '♦';
            return `
                <div class="card ${isRed ? 'red' : 'black'}">
                    <span class="card-rank">${card.rank}</span>
                    <span class="card-suit">${card.suit}</span>
                </div>
            `;
        }

        function cardDisplayFaceDown() {
            return `<div class="card face-down"></div>`;
        }

        // ==========================================================
        // RENDER FUNCTIONS
        // ==========================================================
        function renderHands(showDealerSecond = false) {
            // Player hand
            const playerContainer = document.getElementById('playerCards');
            playerContainer.innerHTML = playerHand.map(card => cardDisplay(card)).join('');

            // Dealer hand
            const dealerContainer = document.getElementById('dealerCards');
            if (showDealerSecond) {
                dealerContainer.innerHTML = dealerHand.map(card => cardDisplay(card)).join('');
            } else {
                if (dealerHand.length > 0) {
                    const dealerCards = [cardDisplay(dealerHand[0])];
                    for (let i = 1; i < dealerHand.length; i++) {
                        dealerCards.push(cardDisplayFaceDown());
                    }
                    dealerContainer.innerHTML = dealerCards.join('');
                }
            }

            // Update totals
            const playerValue = calculateHandValue(playerHand);
            const dealerValue = showDealerSecond ? calculateHandValue(dealerHand) : dealerHand.length > 0 ? calculateHandValue([dealerHand[0]]) : 0;

            document.getElementById('playerTotal').textContent = playerValue;
            document.getElementById('dealerTotal').textContent = dealerValue;

            // Color totals
            const playerTotalEl = document.getElementById('playerTotal');
            const dealerTotalEl = document.getElementById('dealerTotal');

            if (playerValue > 21) {
                playerTotalEl.className = 'hand-total bust';
            } else if (isBlackjack(playerHand)) {
                playerTotalEl.className = 'hand-total blackjack';
            } else {
                playerTotalEl.className = 'hand-total';
            }

            if (showDealerSecond) {
                if (dealerValue > 21) {
                    dealerTotalEl.className = 'hand-total bust';
                } else if (isBlackjack(dealerHand)) {
                    dealerTotalEl.className = 'hand-total blackjack';
                } else {
                    dealerTotalEl.className = 'hand-total';
                }
            } else {
                dealerTotalEl.className = 'hand-total';
            }
        }

        // ==========================================================
        // GAME CONTROLS
        // ==========================================================
        function enableGameControls(enabled) {
            document.getElementById('btnHit').disabled = !enabled;
            document.getElementById('btnStand').disabled = !enabled;
            document.getElementById('btnDouble').disabled = !enabled;

        // ==========================================================
        // ✅ ADJUST BET - FIXED AND WORKING
        // ==========================================================
        function adjustBjBet(amount) {
            const input = document.getElementById('bjBetAmount');
            let val = parseFloat(input.value) || 10;
            
            let newVal = val + amount;
            if (newVal < 1) newVal = 1;
            if (newVal > 1000) newVal = 1000;
            
            input.value = newVal;
            
            input.style.borderColor = '#ffd700';
            setTimeout(() => {
                input.style.borderColor = 'rgba(255, 255, 255, 0.1)';

        // ==========================================================
        // START NEW GAME - FULLY INTEGRATED
        // ==========================================================
        async function startNewGame() {
            const user = getCurrentUser();
            if (!user) {
                showToast('⚠️ Please login first.');
                setTimeout(() => window.location.href = 'login.html', 800);
                return;
            }

            currentBet = parseFloat(document.getElementById('bjBetAmount').value) || 10;
            if (currentBet < 1 || currentBet > 1000) {
                showToast('⚠️ Bet must be between $1 and $1,000.');
                return;
            }

            const users = await querySupabase('users', `?email=eq.${user.email}`);
            if (!users || users.length === 0) {
                showToast('⚠️ Error fetching user data.');
                return;
            }
            const userData = users[0];

            if (userData.balance < currentBet) {
                showToast(`⚠️ Insufficient balance! You have $${formatCurrency(userData.balance)}`);
                return;
            }

            // Deduct bet
            const newBalance = userData.balance - currentBet;
            await updateUserBalance(user.email, newBalance);
            await saveTransaction(user.email, '♠️ Blackjack Bet', -currentBet);

            hideResult();
            deck = createDeck();
            playerHand = [];
            dealerHand = [];
            gameState = 'playing';
            enableGameControls(true);
            document.getElementById('btnNewGame').textContent = 'New Round';
            document.getElementById('bjBalance').textContent = '$' + formatCurrency(newBalance);

            playerHand.push(drawCard());
            dealerHand.push(drawCard());
            playerHand.push(drawCard());
            dealerHand.push(drawCard());

            const playerBJ = isBlackjack(playerHand);
            const dealerBJ = isBlackjack(dealerHand);

            if (playerBJ && dealerBJ) {
                showResult('🤝 PUSH! Both have Blackjack!', 'push', 'Your bet is returned.');
                gameState = 'ended';
                enableGameControls(false);
                renderHands(true);
                // Refund bet
                await updateUserBalance(user.email, newBalance + currentBet);
                await saveGameHistory(user.email, 'Blackjack', currentBet, 0, 'push', 'Both Blackjack');
                updateStats(false, 0, true);
                document.getElementById('bjBalance').textContent = '$' + formatCurrency(newBalance + currentBet);
                return;
            }

            if (playerBJ) {
                const winAmount = currentBet * 1.5;
                showResult('🎉 BLACKJACK! You win!', 'win', `You won $${formatCurrency(winAmount)}!`);
                gameState = 'ended';
                enableGameControls(false);
                renderHands(true);
                await updateUserBalance(user.email, newBalance + winAmount);
                await saveTransaction(user.email, '♠️ Blackjack Win', winAmount);
                await saveGameHistory(user.email, 'Blackjack', currentBet, winAmount, 'win', 'Blackjack!');
                updateStats(true, winAmount);
                document.getElementById('bjBalance').textContent = '$' + formatCurrency(newBalance + winAmount);
                return;
            }

            if (dealerBJ) {
                showResult('😢 Dealer has Blackjack!', 'lose', `You lost $${formatCurrency(currentBet)}.`);
                gameState = 'ended';
                enableGameControls(false);
                renderHands(true);
                await saveGameHistory(user.email, 'Blackjack', currentBet, 0, 'lose', 'Dealer Blackjack');
                updateStats(false, 0);
                return;
            }

            renderHands(false);
        }

        // ==========================================================
        // PLAYER ACTIONS
        // ==========================================================
        function playerHit() {
            if (gameState !== 'playing') return;

            playerHand.push(drawCard());
            renderHands(false);

            if (isBust(playerHand)) {
                gameState = 'ended';
                enableGameControls(false);
                showResult('💥 BUST!', 'lose', `You went over 21. Lost $${formatCurrency(currentBet)}.`);
                resolveGame('lose');
            }
        }

        function playerStand() {
            if (gameState !== 'playing') return;

            gameState = 'ended';
            enableGameControls(false);
            dealerTurn();
        }

        function playerDouble() {
            if (gameState !== 'playing' || playerHand.length !== 2) return;

            const user = getCurrentUser();
            if (!user) return;

            querySupabase('users', `?email=eq.${user.email}`).then(async (users) => {
                if (!users || users.length === 0) return;
                const userData = users[0];

                const doubledBet = currentBet * 2;
                if (userData.balance < doubledBet) {
                    showToast(`⚠️ Insufficient balance for double! Need $${formatCurrency(doubledBet)}`);
                    return;
                }

                const newBalance = userData.balance - currentBet;
                await updateUserBalance(user.email, newBalance);
                await saveTransaction(user.email, '♠️ Blackjack Double', -currentBet);
                currentBet = doubledBet;

                playerHand.push(drawCard());
                renderHands(false);

                if (isBust(playerHand)) {
                    gameState = 'ended';
                    enableGameControls(false);
                    showResult('💥 BUST!', 'lose', `You went over 21. Lost $${formatCurrency(currentBet)}.`);
                    resolveGame('lose');
                } else {
                    gameState = 'ended';
                    enableGameControls(false);
                    dealerTurn();
                }
            });
        }

        // ==========================================================
        // DEALER TURN
        // ==========================================================
        async function dealerTurn() {
            renderHands(true);

            while (calculateHandValue(dealerHand) < 17) {
                dealerHand.push(drawCard());
                renderHands(true);
                await new Promise(resolve => setTimeout(resolve, 400));
            }

            const playerValue = calculateHandValue(playerHand);
            const dealerValue = calculateHandValue(dealerHand);

            if (dealerValue > 21) {
                showResult('🎉 DEALER BUSTS! You win!', 'win', `Dealer went over 21. You won $${formatCurrency(currentBet)}!`);
                resolveGame('win');
            } else if (playerValue > dealerValue) {
                showResult('🎉 YOU WIN!', 'win', `You won $${formatCurrency(currentBet)}!`);
                resolveGame('win');
            } else if (dealerValue > playerValue) {
                showResult('😢 DEALER WINS!', 'lose', `You lost $${formatCurrency(currentBet)}.`);
                resolveGame('lose');
            } else {
                showResult('🤝 PUSH!', 'push', 'Your bet is returned.');
                resolveGame('push');
            }
        }

        // ==========================================================
        // RESOLVE GAME - SAVES TO HISTORY
        // ==========================================================
        async function resolveGame(result) {
            const user = getCurrentUser();
            if (!user) return;

            const users = await querySupabase('users', `?email=eq.${user.email}`);
            if (!users || users.length === 0) return;
            const userData = users[0];

            let winAmount = 0;
            let newBalance = userData.balance;
            let resultText = '';

            if (result === 'win') {
                winAmount = currentBet;
                newBalance = userData.balance + winAmount;
                resultText = 'win';
                await updateUserBalance(user.email, newBalance);
                await saveTransaction(user.email, '♠️ Blackjack Win', winAmount);
                await saveGameHistory(user.email, 'Blackjack', currentBet, winAmount, 'win', 'Player won');
                updateStats(true, winAmount);
            } else if (result === 'lose') {
                resultText = 'lose';
                await saveGameHistory(user.email, 'Blackjack', currentBet, 0, 'lose', 'Player lost');
                updateStats(false, 0);
            } else if (result === 'push') {
                newBalance = userData.balance + currentBet;
                resultText = 'push';
                await updateUserBalance(user.email, newBalance);
                await saveGameHistory(user.email, 'Blackjack', currentBet, 0, 'push', 'Push');
                updateStats(false, 0, true);
            }

            document.getElementById('bjBalance').textContent = '$' + formatCurrency(newBalance);
            document.getElementById('btnNewGame').textContent = '♠️ New Game';
            gameState = 'idle';
        }

        // ==========================================================
        // STATS
        // ==========================================================
        function updateStats(isWin, amount, isPush = false) {
            bjStats.played++;
            if (isWin) {
                bjStats.won++;
                bjStats.totalWon += amount;
            }
            localStorage.setItem('bjStats', JSON.stringify(bjStats));

            const resultText = isWin ? 'Win' : isPush ? 'Push' : 'Lose';
            bjHistory.unshift({
                result: resultText,
                amount: isWin ? amount : isPush ? 0 : -currentBet,
                time: new Date().toLocaleTimeString()
            });
            if (bjHistory.length > 50) bjHistory.pop();
            localStorage.setItem('bjHistory', JSON.stringify(bjHistory));

            updateStatsUI();
            renderBjHistory();
        }

        function updateStatsUI() {
            document.getElementById('bjGamesPlayed').textContent = bjStats.played;
            document.getElementById('bjGamesWon').textContent = bjStats.won;
            document.getElementById('bjTotalWon').textContent = '$' + formatCurrency(bjStats.totalWon);
        }

        function renderBjHistory() {
            const container = document.getElementById('bjHistoryList');
            
            if (bjHistory.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; color:rgba(255,255,255,0.2); font-size:13px; padding:12px 0;">
                        No games played yet. Start playing!
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            bjHistory.slice(0, 20).forEach(game => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const resultClass = game.result.toLowerCase();
                const isWin = game.result === 'Win';
                const isPush = game.result === 'Push';
                div.innerHTML = `
                    <div>
                        <span class="h-result ${resultClass}">${game.result}</span>
                        <span style="font-size:10px; color:rgba(255,255,255,0.2); margin-left:6px;">${game.time}</span>
                    </div>
                    <div>
                        <span class="h-amount ${isWin ? 'win-amount' : isPush ? '' : 'lose-amount'}">
                            ${isWin ? '+' : isPush ? '' : '-'}$${formatCurrency(Math.abs(game.amount))}
                        </span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function clearBjHistory() {
            if (confirm('Clear all game history?')) {
                bjHistory = [];
                localStorage.setItem('bjHistory', JSON.stringify(bjHistory));
                renderBjHistory();
                showToast('✅ History cleared.');
            }
        }

        // ==========================================================
        // LOAD BALANCE
        // ==========================================================
        async function loadBjBalance() {
            const user = getCurrentUser();
            if (user) {
                const users = await querySupabase('users', `?email=eq.${user.email}`);
                if (users && users.length > 0) {
                    document.getElementById('bjBalance').textContent = '$' + formatCurrency(users[0].balance);
                }
            }
        }

        // ==========================================================
        // INPUT VALIDATION
        // ==========================================================
        document.getElementById('bjBetAmount').addEventListener('change', function() {
            let val = parseFloat(this.value) || 10;
            if (val < 1) val = 1;
            if (val > 1000) val = 1000;
            this.value = val;
        });

        document.getElementById('bjBetAmount').addEventListener('input', function() {
            let val = parseFloat(this.value) || 10;
            if (val >= 1 && val <= 1000) {
                currentBet = val;
            }
        });

        // ==========================================================
        // KEYBOARD SHORTCUTS
        // ==========================================================
        document.addEventListener('keydown', function(e) {
            const input = document.getElementById('bjBetAmount');
            if (document.activeElement === input) {
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    var val = parseFloat(input.value) || 10;
                    input.value = Math.min(1000, val + 1);
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    var val = parseFloat(input.value) || 10;
                    input.value = Math.max(1, val - 1);
                }
            }
        });

        // ==========================================================
        // INIT
        // ==========================================================
        document.addEventListener('DOMContentLoaded', async function() {
            renderBjHistory();
            updateStatsUI();
            await loadBjBalance();
            startNewGame();

            console.log('♠️ Blackjack integrated with Supabase!');
            console.log('✅ Connected to:', SUPABASE_URL);
            console.log('✅ Games will appear in history.html');
        });
    </script>
